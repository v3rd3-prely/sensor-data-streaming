version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "8080:8080"
    networks:
      - app-network

  client:
    build: ./client
    ports:
      - "8081:8081"
    environment:
      - SERVER_URL=http://server:8080
    depends_on:
      - server
    networks:
      - app-network

networks:
  app-network:
    driver: bridge